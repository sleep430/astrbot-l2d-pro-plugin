name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'dist/**'
      - 'dist-electron/**'
      - 'resources/**'
      - 'scripts/**'
      - 'RELEASE_NOTES_v1.1.md'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.1.0'
        required: true
        default: '1.1.0'

permissions:
  contents: write

concurrency:
  group: release-v1-1
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '1.1.0'
          }

          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Invalid version: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Stop if release already exists
        id: existing_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $env:TAG_NAME already exists; skipping build."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install dependencies
        if: steps.existing_release.outputs.exists != 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Patch package version for this release
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"

      - name: Build Windows artifacts
        if: steps.existing_release.outputs.exists != 'true'
        run: pnpm run pack:win

      - name: List artifacts
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        run: Get-ChildItem release -File | Sort-Object Name | Format-Table Name, Length

      - name: Create tag
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag $env:TAG_NAME
          git push origin $env:TAG_NAME

      - name: Create GitHub release
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $assets = Get-ChildItem release -File | Where-Object {
            $_.Name -match '\.(exe|yml|blockmap)$'
          } | ForEach-Object { $_.FullName }

          if (-not $assets -or $assets.Count -eq 0) {
            throw 'No release assets were produced.'
          }

          gh release create $env:TAG_NAME $assets --title "L2D Pro v$env:RELEASE_VERSION" --notes-file RELEASE_NOTES_v1.1.md --latest
